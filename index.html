<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новостная лента He Dewlos</title>
    <style>
        /* Базовые стили под дизайн Гематогенки */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10; /* Темный фон оригинального сайта */
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .tg-news-section {
            width: 100%;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .tg-news-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* Контейнер виджета. Высота 620px идеально вмещает 2 поста */
        .tg-news-wrapper {
            position: relative;
            max-height: 620px; 
            overflow: hidden;
            border-radius: 16px;
            transition: max-height 0.4s ease-in-out;
        }

        /* Состояние развернутой ленты */
        .tg-news-wrapper.expanded {
            max-height: 4000px; 
        }

        /* Градиентное затемнение внизу (эффект скрытых постов) */
        .tg-news-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(transparent, #0b0c10); 
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .tg-news-wrapper.expanded::after {
            opacity: 0; /* Убираем затемнение, когда лента открыта */
        }

        /* Кнопка "Смотреть далее" в стиле вашего сайта */
        .tg-more-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 38px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .tg-more-btn:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }
        
        .tg-more-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<section class="tg-news-section">
    <h1 class="tg-news-title">🌙 Свежие новости из Telegram</h1>
    
    <div class="tg-news-wrapper" id="tgWrapper">
        <!-- Официальный виджет Telegram для канала nedewlos -->
        <script async src="https://telegram.org" 
                data-telegram-channel="nedewlos" 
                data-dark="1" 
                data-width="100%" 
                data-userpic="false" 
                data-limit="10">
        </script>
    </div>

    <button class="tg-more-btn" id="tgMoreBtn">Смотреть далее</button>
</section>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const wrapper = document.getElementById("tgWrapper");
        const btn = document.getElementById("tgMoreBtn");

        btn.addEventListener("click", function() {
            if (!wrapper.classList.contains("expanded")) {
                wrapper.classList.add("expanded");
                btn.textContent = "Свернуть обратно";
            } else {
                wrapper.classList.remove("expanded");
                btn.textContent = "Смотреть далее";
                // Плавная прокрутка обратно к началу новостей
                wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
    });
</script>

</body>
</html>
